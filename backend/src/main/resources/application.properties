# ─────────────────────────────────────────────────────────────
#  application.properties — lee variables del archivo .env
# ─────────────────────────────────────────────────────────────

# Servidor
server.port=${SERVER_PORT:8080}

# Base de datos PostgreSQL (Neon)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Admin inicial
app.admin.email=${ADMIN_EMAIL:admin@virtualpet.co}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Uploads
app.upload.dir=${UPLOAD_DIR:uploads/productos}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000